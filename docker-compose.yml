services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CHANNEL_IDS: ${YOUTUBE_CHANNEL_IDS:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      TOKEN_SECRET: ${TOKEN_SECRET:-rayver-secret-2025-change-me}
      DATA_DIR: /app/data
    volumes:
      - rayver_data:/app/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  app_net:
    driver: bridge

# Named volume con nombre fijo — NO depende del project name de Coolify.
# Docker no lo elimina con "docker compose down" (solo con "down -v").
volumes:
  rayver_data:
    name: rayvermusic_data
