upstream backend_node {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    real_ip_header   X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    # Admin — servir directamente, nunca redirigir a index.html
    location = /admin.html {
        try_files /admin.html =404;
    }

    # Service worker — nunca cachear, para que las actualizaciones se detecten
    location = /service-worker.js {
        try_files /service-worker.js =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # API proxy al backend Node
    location /api/ {
        proxy_pass         http://backend_node;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_fallback;
    }

    location @api_fallback {
        default_type application/json;
        return 503 '{"error":"Backend no disponible","code":503}';
    }

    # Assets estáticos con caché
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }


    # Todo lo demás — SPA principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
